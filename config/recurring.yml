production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  reconcile_pending_tips:
    class: Paystack::ReconcilePendingTipsJob
    queue: default
    schedule: every 15 minutes
  retry_failed_webhook_events:
    class: Paystack::RetryFailedWebhookEventsJob
    queue: webhooks
    schedule: every hour at minute 30
  sync_settlements:
    class: Paystack::SyncSettlementsJob
    queue: default
    schedule: every hour at minute 45
  reconcile_platform:
    class: Paystack::ReconcilePlatformJob
    queue: default
    schedule: every 6 hours
